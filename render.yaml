services:
  - type: web
    name: nexus-business-suite
    env: node
    plan: free
    buildCommand: rm -rf backend/node_modules frontend/node_modules && npm run build && cd backend && npm rebuild
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 5000
