services:
  - type: web
    name: nexus-business-suite
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_API_KEY
        sync: false # You will enter this in the dashboard
      - key: PORT
        value: 5000
